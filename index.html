
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pianificazione Medici</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #070f1c;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  color: #e2e8f0;
}

/* ── BARRA TOP ANIMATA ── */
#rainbow-bar {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 4px;
  z-index: 10000;
  background: linear-gradient(90deg,
    #3b82f6, #6366f1, #8b5cf6, #3b82f6, #06b6d4, #3b82f6);
  background-size: 400% 100%;
  -webkit-animation: slideBar 6s linear infinite;
  animation: slideBar 6s linear infinite;
}
@-webkit-keyframes slideBar {
  0%   { background-position: 0% 0%; }
  100% { background-position: 400% 0%; }
}
@keyframes slideBar {
  0%   { background-position: 0% 0%; }
  100% { background-position: 400% 0%; }
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 4px; left: 0;
  width: 100%; height: 64px;
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, rgba(10,22,45,0.98) 0%, rgba(7,15,28,0.92) 100%);
  border-bottom: 1px solid rgba(59,130,246,0.3);
}

#data-completa {
  font-size: 28px;
  font-weight: 700;
  color: #f0f6ff;
  letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(59,130,246,0.5);
}

/* ── REFRESH LOADER BAR ── */
#loader-bar {
  position: fixed;
  top: 68px; left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  z-index: 9997;
  opacity: 0;
  -webkit-transition: opacity 0.3s;
  transition: opacity 0.3s;
  border-radius: 0 2px 2px 0;
}
#loader-bar.running {
  opacity: 1;
  -webkit-animation: loadAnim 22s linear forwards;
  animation: loadAnim 22s linear forwards;
}
@-webkit-keyframes loadAnim {
  0%   { width: 0%; }
  80%  { width: 90%; }
  100% { width: 90%; }
}
@keyframes loadAnim {
  0%   { width: 0%; }
  80%  { width: 90%; }
  100% { width: 90%; }
}

/* ── IFRAME AREA ── */
#viewer-wrap {
  position: fixed;
  top: 71px;
  left: 0;
  bottom: 90px;
  right: 0;
  overflow: hidden;
  z-index: 1;
}

#viewer-main {
  position: absolute;
  top: 0; left: 0;
  border: none;
  display: block;
}

/*
  Overlay SOLO per il primo caricamento.
  Durante i refresh successivi NON viene mostrato:
  l'iframe mantiene il vecchio contenuto visibile
  finché il nuovo non è pronto (zero memoria extra).
*/
#reload-overlay {
  position: fixed;
  top: 71px; left: 0;
  bottom: 90px; right: 0;
  background: #070f1c;
  z-index: 5000;
  display: none;
  align-items: center;
  justify-content: center;
}
#reload-overlay.visible {
  display: -webkit-flex;
  display: flex;
}

/* ── FOOTER ── */
#footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 90px;
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  background: linear-gradient(0deg, rgba(10,22,45,0.98) 0%, rgba(7,15,28,0.92) 100%);
  border-top: 1px solid rgba(59,130,246,0.25);
}

/* Orologio */
#clock {
  display: flex;
  align-items: center;
  gap: 4px;
}

.clock-block {
  display: flex;
  gap: 2px;
}

.digit {
  width: 52px; height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 62px;
  font-weight: 800;
  color: #f1f5f9;
  text-shadow: 0 0 18px rgba(59,130,246,0.6);
  line-height: 1;
  -webkit-font-smoothing: antialiased;
}

.sep {
  font-size: 58px;
  font-weight: 800;
  color: #3b82f6;
  text-shadow: 0 0 18px rgba(59,130,246,0.8);
  padding: 0 4px;
  line-height: 1;
  -webkit-animation: blink 1s step-end infinite;
  animation: blink 1s step-end infinite;
}
@-webkit-keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}

.digit-sec {
  display: flex;
  align-items: flex-end;
  padding-bottom: 10px;
  gap: 1px;
}

.digit-sec .d {
  font-size: 30px;
  font-weight: 700;
  color: #64748b;
  width: 20px;
  text-align: center;
}

/* Centro footer */
#footer-center {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#refresh-status {
  margin-top: 6px;
  font-size: 12px;
  color: #475569;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

#refresh-icon {
  display: inline-block;
  font-size: 14px;
  color: #22c55e;
}
#refresh-icon.spinning {
  -webkit-animation: spin 1s linear infinite;
  animation: spin 1s linear infinite;
}
@-webkit-keyframes spin {
  0%   { -webkit-transform: rotate(0deg);   }
  100% { -webkit-transform: rotate(360deg); }
}
@keyframes spin {
  0%   { transform: rotate(0deg);   }
  100% { transform: rotate(360deg); }
}

/* Destra footer: prossimo aggiornamento */
#footer-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#next-label {
  font-size: 13px;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

#next-time {
  font-size: 22px;
  font-weight: 700;
  color: #94a3b8;
  margin-top: 3px;
}

#countdown {
  font-size: 13px;
  color: #334155;
  margin-top: 2px;
}

</style>
</head>
<body>

<div id="rainbow-bar"></div>

<!-- HEADER: solo data centrata -->
<div id="header">
  <div id="data-completa">—</div>
</div>

<!-- LOADER BAR -->
<div id="loader-bar"></div>

<!-- SINGOLO IFRAME (basso consumo memoria) -->
<div id="viewer-wrap">
  <iframe id="viewer-main" scrolling="no"></iframe>
</div>
<!-- Overlay: visibile SOLO al primo avvio, nascosto durante i refresh -->
<div id="reload-overlay" class="visible"></div>

<!-- FOOTER -->
<div id="footer">

  <div id="clock">
    <div class="clock-block">
      <div class="digit" id="h1">0</div>
      <div class="digit" id="h2">0</div>
    </div>
    <div class="sep">:</div>
    <div class="clock-block">
      <div class="digit" id="m1">0</div>
      <div class="digit" id="m2">0</div>
    </div>
    <div class="digit-sec">
      <div class="d" id="s1">0</div>
      <div class="d" id="s2">0</div>
    </div>
  </div>

  <div id="footer-center">
    <img id="footer-logo-img" src="data:image/png;base64,Qk2KCxMAAAAAAIoAAAB8AAAAsAQAAAQBAAABACAAAwAAAAALEwAjLgAAIy4AAAAAAAAAAAAAAAD/AAD/AAD/AAAAAAAA/0JHUnOAwvUoYLgeFSCF6wFAMzMTgGZmJkBmZgagmZkJPArXAyRcjzIAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" style="height:40px;opacity:0.85;">
    <div id="refresh-status">
      <span id="refresh-icon">✔</span>
      <span id="refresh-text">Aggiornato alle —</span>
    </div>
  </div>

  <div id="footer-right">
    <div id="next-label">Prossimo aggiornamento</div>
    <div id="next-time">—</div>
    <div id="countdown"></div>
  </div>

</div>

<script>

var BASE_URL = "https://medeadigitalhealth-my.sharepoint.com/personal/a_marino_med-ea_it/_layouts/15/Doc.aspx?sourcedoc={262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!A3%3AAK22";
var REFRESH_INTERVAL_MS = 300000; // 5 minuti

// Pixel extra in altezza per tagliare la barra in basso di Excel
var EXCEL_BAR_PX = 40;

// padStart non sempre disponibile su TV Tizen
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

/* ── DIMENSIONI IFRAME ── */
function applyViewerSize() {
  var headerH = 71;
  var footerH = 90;
  var w = window.innerWidth;
  var visibleH = window.innerHeight - headerH - footerH;
  var iframeH  = visibleH + EXCEL_BAR_PX;
  var iv = document.getElementById('viewer-main');
  iv.style.width  = w + 'px';
  iv.style.height = iframeH + 'px';
}
applyViewerSize();
window.addEventListener('resize', applyViewerSize);

var GIORNI = ['Domenica','Lunedi','Martedi','Mercoledi','Giovedi','Venerdi','Sabato'];
var MESI   = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

var lastUpdated = null;
var nextRefresh = null;
var reloading   = false;
var firstLoad   = true; // true solo al primo caricamento

/* ── LOADER BAR ── */
function startLoaderBar() {
  var bar = document.getElementById('loader-bar');
  bar.className = '';
  bar.style.width = '0%';
  void bar.offsetWidth;
  bar.className = 'running';
}
function stopLoaderBar() {
  var bar = document.getElementById('loader-bar');
  bar.style.width = '100%';
  bar.style.opacity = '0';
  setTimeout(function() { bar.className = ''; bar.style.width = '0%'; }, 400);
}

/* ── ICONA REFRESH ── */
function setRefreshIcon(loading) {
  var icon = document.getElementById('refresh-icon');
  if (loading) {
    icon.textContent = '\u21BB'; // ↻
    icon.className = 'spinning';
    icon.style.color = '#3b82f6';
  } else {
    icon.textContent = '\u2714'; // ✔
    icon.className = '';
    icon.style.color = '#22c55e';
  }
}

/* ── OVERLAY (solo primo avvio) ── */
function showOverlay() {
  document.getElementById('reload-overlay').className = 'visible';
}
function hideOverlay() {
  document.getElementById('reload-overlay').className = '';
}

/*
  ── CARICA IFRAME ──
  Primo caricamento: usa iv.src (normale).
  Refresh successivi: usa contentWindow.location.replace() per navigare
  senza svuotare l'iframe → il vecchio contenuto resta visibile
  fino al completamento del nuovo caricamento.
  Zero memoria extra: nessun secondo iframe.
*/
function loadViewer(url, onDone) {
  var iv = document.getElementById('viewer-main');
  var done = false;
  var timer = setTimeout(function() {
    if (!done) { done = true; if (onDone) onDone(); }
  }, 28000);
  iv.onload = function() {
    if (!done) {
      done = true;
      clearTimeout(timer);
      // piccola pausa per far renderizzare il contenuto
      setTimeout(function() { if (onDone) onDone(); }, 1200);
    }
  };

  if (firstLoad) {
    // Primo avvio: imposta src normalmente
    firstLoad = false;
    iv.src = url;
  } else {
    /*
      Refresh: naviga tramite contentWindow.location.replace()
      Su Tizen/WebKit questo mantiene il vecchio contenuto visibile
      durante il caricamento invece di mostrare uno schermo vuoto.
      Fallback su iv.src se non disponibile.
    */
    try {
      iv.contentWindow.location.replace(url);
    } catch (e) {
      iv.src = url;
    }
  }
}

/* ── RELOAD EXCEL ── */
function reloadExcel() {
  if (reloading) return;
  reloading = true;
  setRefreshIcon(true);
  startLoaderBar();
  // NON mostriamo l'overlay: il vecchio contenuto resta visibile
  // L'icona ↻ animata nel footer indica che è in corso l'aggiornamento

  var url = BASE_URL + '&t=' + Date.now();
  loadViewer(url, function() {
    reloading = false;
    stopLoaderBar();
    setRefreshIcon(false);
    lastUpdated = new Date();
    updateRefreshStatus();
  });
}

/* ── STATUS ── */
function updateRefreshStatus() {
  if (!lastUpdated) return;
  document.getElementById('refresh-text').textContent =
    'Aggiornato alle ' + pad2(lastUpdated.getHours()) + ':' + pad2(lastUpdated.getMinutes());
}

function updateNextRefresh() {
  if (!nextRefresh) return;
  var diff = Math.max(0, Math.floor((nextRefresh - Date.now()) / 1000));
  var mm = Math.floor(diff / 60);
  var ss = diff % 60;
  var nr = new Date(nextRefresh);
  document.getElementById('next-time').textContent = pad2(nr.getHours()) + ':' + pad2(nr.getMinutes());
  document.getElementById('countdown').textContent = 'tra ' + pad2(mm) + ':' + pad2(ss);
}

/* ── OROLOGIO ── */
function updateClock() {
  var now = new Date();
  var h = pad2(now.getHours());
  var m = pad2(now.getMinutes());
  var s = pad2(now.getSeconds());
  document.getElementById('h1').textContent = h[0];
  document.getElementById('h2').textContent = h[1];
  document.getElementById('m1').textContent = m[0];
  document.getElementById('m2').textContent = m[1];
  document.getElementById('s1').textContent = s[0];
  document.getElementById('s2').textContent = s[1];

  var g  = GIORNI[now.getDay()];
  var d  = now.getDate();
  var me = MESI[now.getMonth()];
  var y  = now.getFullYear();
  document.getElementById('data-completa').textContent = g + '  ' + d + ' ' + me + ' ' + y;

  updateNextRefresh();
}

/* ── AVVIO ── */
(function init() {
  setRefreshIcon(true);
  startLoaderBar();
  loadViewer(BASE_URL + '&t=' + Date.now(), function() {
    hideOverlay();
    stopLoaderBar();
    setRefreshIcon(false);
    lastUpdated = new Date();
    updateRefreshStatus();
  });

  function scheduleRefresh() {
    nextRefresh = Date.now() + REFRESH_INTERVAL_MS;
    setTimeout(function() {
      reloadExcel();
      scheduleRefresh();
    }, REFRESH_INTERVAL_MS);
  }
  scheduleRefresh();

  setInterval(updateClock, 1000);
  updateClock();

  // Anti-freeze TV: tocca il DOM ogni 15s per evitare che Tizen congeli il tab
  setInterval(function() {
    var bar = document.getElementById('rainbow-bar');
    bar.style.opacity = '0.99';
    setTimeout(function() { bar.style.opacity = '1'; }, 100);
  }, 15000);
})();

</script>
</body>
</html>
