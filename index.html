<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Ufficio</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        /* Sfondo nero forzato per evitare il flash bianco */
        html, body { margin: 0; padding: 0; background-color: #000000 !important; width: 100%; height: 100%; overflow: hidden; }
        .container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        
        /* Iframe con sfondo bianco per i dati Excel */
        iframe { width: 100%; height: 100%; border: none; background-color: white; display: block; }

        #clock {
            position: fixed; top: 30px; right: 40px;
            font-family: 'Orbitron', sans-serif; font-size: 60px; letter-spacing: 3px;
            color: #00e5ff; padding: 12px 26px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            border-radius: 14px;
            box-shadow: 0 0 15px rgba(0,229,255,0.5);
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="clock">00:00</div>
    <div class="container">
        <!-- Rimosso x-frame-bypass che causava il blocco su TV -->
        <iframe id="frameA" src=""></iframe>
        <iframe id="frameB" style="display:none" src=""></iframe>
    </div>

    <script>
        // URL ORIGINALE (Assicurati che il file sia condiviso come "Chiunque abbia il link può visualizzare")
        const baseUrl = "https://medeadigitalhealth-my.sharepoint.com{262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!B1%3AAK23";
        
        let active = "A";

        // Caricamento iniziale
        document.getElementById("frameA").src = baseUrl;

        // OROLOGIO
        function updateClock() {
            const now = new Date();
            document.getElementById("clock").innerText = 
                String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // REFRESH INVISIBILE (Senza bypass, solo rotazione frame)
        function refresh() {
            const nextLetter = (active === "A" ? "B" : "A");
            const current = document.getElementById("frame" + active);
            const next = document.getElementById("frame" + nextLetter);

            // Carica il nuovo URL con timestamp per evitare la cache
            next.src = baseUrl + "&t=" + new Date().getTime();

            next.onload = function() {
                next.style.display = "block";
                current.style.display = "none";
                active = nextLetter;
            };
        }

        setInterval(refresh, 60000); // Ogni minuto
        setTimeout(() => location.reload(), 28800000); // Reset ogni 8 ore
    </script>
</body>
</html>
