
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pianificazione Medici</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230a162d'/><path d='M50 75 C50 75 20 55 20 35 C20 25 28 18 38 20 C43 21 47 25 50 30 C53 25 57 21 62 20 C72 18 80 25 80 35 C80 55 50 75 50 75Z' fill='%233b82f6'/><polyline points='28,50 36,38 44,56 52,32 60,50 68,44 76,50' fill='none' stroke='white' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #070f1c;
  font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  color: #e2e8f0;
}

/* ── BARRA TOP ANIMATA ── */
#rainbow-bar {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 4px;
  z-index: 10000;
  background: linear-gradient(90deg,
    #3b82f6, #6366f1, #8b5cf6, #3b82f6, #06b6d4, #3b82f6);
  background-size: 400% 100%;
  -webkit-animation: slideBar 6s linear infinite;
  animation: slideBar 6s linear infinite;
}
@-webkit-keyframes slideBar {
  0%   { background-position: 0% 0%; }
  100% { background-position: 400% 0%; }
}
@keyframes slideBar {
  0%   { background-position: 0% 0%; }
  100% { background-position: 400% 0%; }
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 4px; left: 0;
  width: 100%; height: 80px;
  z-index: 9998;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  background: linear-gradient(180deg, rgba(10,22,45,0.98) 0%, rgba(7,15,28,0.92) 100%);
  border-bottom: 1px solid rgba(59,130,246,0.3);
}

#data-completa {
  font-size: 40px;
  font-weight: 700;
  font-style: italic;
  color: #f0f6ff;
  letter-spacing: 2px;
  text-shadow: 0 0 24px rgba(59,130,246,0.6);
}

/* ── REFRESH LOADER BAR ── */
#loader-bar {
  position: fixed;
  top: 68px; left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  z-index: 9997;
  opacity: 0;
  -webkit-transition: opacity 0.3s;
  transition: opacity 0.3s;
  border-radius: 0 2px 2px 0;
}
#loader-bar.running {
  opacity: 1;
  -webkit-animation: loadAnim 3s linear forwards;
  animation: loadAnim 3s linear forwards;
}
@-webkit-keyframes loadAnim {
  0%   { width: 0%; }
  80%  { width: 90%; }
  100% { width: 90%; }
}
@keyframes loadAnim {
  0%   { width: 0%; }
  80%  { width: 90%; }
  100% { width: 90%; }
}

/* ── VIEWER AREA ── */
#viewer-wrap {
  position: fixed;
  top: 88px;
  left: 0;
  bottom: 100px;
  right: 0;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 1;
  background: #0f1117;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,200,83,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 110%, rgba(255,109,0,0.10) 0%, transparent 55%);
}

#turni-container {
  padding: 12px 20px 14px;
  min-height: 100%;
}

/* ── FOOTER ── */
#footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 100px;
  z-index: 9998;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  padding: 0 48px;
  background: linear-gradient(0deg, rgba(10,22,45,0.98) 0%, rgba(7,15,28,0.92) 100%);
  border-top: 1px solid rgba(59,130,246,0.25);
}

/* Orologio */
#clock {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 4px;
}

.clock-block {
  display: -webkit-flex;
  display: flex;
  gap: 2px;
}

.digit {
  width: 58px; height: 78px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  font-size: 70px;
  font-weight: 800;
  color: #f1f5f9;
  text-shadow: 0 0 18px rgba(59,130,246,0.6);
  line-height: 1;
  -webkit-font-smoothing: antialiased;
}

.sep {
  font-size: 66px;
  font-weight: 800;
  color: #3b82f6;
  text-shadow: 0 0 18px rgba(59,130,246,0.8);
  padding: 0 4px;
  line-height: 1;
  -webkit-animation: blink 1s step-end infinite;
  animation: blink 1s step-end infinite;
}
@-webkit-keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}

.digit-sec {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: flex-end;
  align-items: flex-end;
  padding-bottom: 10px;
  gap: 1px;
}

.digit-sec .d {
  font-size: 34px;
  font-weight: 700;
  color: #64748b;
  width: 24px;
  text-align: center;
}

/* Centro footer */
#footer-center {
  text-align: center;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}

#footer-logo-img {
  height: 62px;
  width: auto;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

#refresh-status {
  margin-top: 6px;
  font-size: 15px;
  color: #475569;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  gap: 6px;
}

#refresh-icon {
  display: inline-block;
  font-size: 17px;
  color: #22c55e;
}
#refresh-icon.spinning {
  -webkit-animation: spin 1s linear infinite;
  animation: spin 1s linear infinite;
}
@-webkit-keyframes spin {
  0%   { -webkit-transform: rotate(0deg);   }
  100% { -webkit-transform: rotate(360deg); }
}
@keyframes spin {
  0%   { transform: rotate(0deg);   }
  100% { transform: rotate(360deg); }
}

/* Destra footer */
#footer-right {
  text-align: right;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-justify-content: center;
  justify-content: center;
}

#next-label {
  font-size: 15px;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

#next-time {
  font-size: 26px;
  font-weight: 700;
  color: #94a3b8;
  margin-top: 3px;
}

#countdown {
  font-size: 15px;
  color: #334155;
  margin-top: 2px;
}

/* ═══════════════════════════════════════
   TURNI MEDICI — CSS
   ═══════════════════════════════════════ */

:root {
  --green:      #00c853;
  --green-dark: #00962f;
  --orange:     #ff6d00;
  --orange-dark:#c43e00;
  --pink:       #e91e63;
  --amber:      #ff8f00;
  --blue:       #1565c0;
  --purple:     #6a1b9a;
  --surface:    rgba(255,255,255,0.05);
  --border:     rgba(255,255,255,0.10);
  --text:       #f0f0f5;
  --muted:      rgba(255,255,255,0.38);
  --radius:     18px;
}

/* ── TURNI HEADER ── */
.turni-header {
  text-align: center;
  margin-bottom: 28px;
  animation: fadeDown .5s ease both;
}
.turni-header h1 {
  font-size: clamp(22px, 3vw, 30px);
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,.5));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}
.turni-header .date-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 18px;
  font-size: 17px;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
  letter-spacing: .5px;
  backdrop-filter: blur(8px);
}
.date-badge .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease infinite;
}

/* ── MAIN GRID ── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1.6fr;
  gap: 12px;
  margin-bottom: 12px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(16px);
  overflow: hidden;
  animation: fadeUp .5s ease both;
}
.card:nth-child(2) { animation-delay: .07s; }
.card:nth-child(3) { animation-delay: .14s; }

/* ── CARD HEADER ── */
.card-hdr {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 18px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.card-hdr.green {
  background: linear-gradient(135deg, rgba(0,200,83,.25), rgba(0,150,47,.15));
  border-bottom: 1px solid rgba(0,200,83,.25);
  color: #69f0ae;
}
.card-hdr.orange {
  background: linear-gradient(135deg, rgba(255,109,0,.25), rgba(196,62,0,.15));
  border-bottom: 1px solid rgba(255,109,0,.25);
  color: #ffab76;
}
.card-hdr.blue {
  background: linear-gradient(135deg, rgba(21,101,192,.25), rgba(13,71,161,.15));
  border-bottom: 1px solid rgba(21,101,192,.30);
  color: #82b1ff;
  font-size: 15px;
}

/* ── SECTION DIVIDER ── */
.section-label {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 18px 5px;
  border-top: 1px solid var(--border);
}
.section-label:first-of-type { border-top: none; }

/* ── ECG CHIP ── */
.ecg-label {
  display: inline-block;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: rgba(105,240,174,.12);
  color: #69f0ae;
  border: 1px solid rgba(105,240,174,.25);
  border-radius: 20px;
  padding: 3px 12px;
}

/* ── ECG BADGE IN TABELLA ── */
.ecg-badge-chip {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  background: rgba(59,130,246,.15);
  color: #82b1ff;
  border: 1px solid rgba(59,130,246,.3);
  border-radius: 14px;
  padding: 2px 9px;
  margin-left: 8px;
  vertical-align: middle;
  flex-shrink: 0;
}

/* ── DOCTOR SLOT ── */
.doc-section {
  padding: 10px 16px 12px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.doc-name {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.65;
}
.doc-empty {
  font-size: 15px;
  color: var(--muted);
  font-style: italic;
}

/* ── ESAMI COLUMN ── */
.esami-grid {
  display: flex;
  flex-direction: column;
}
.esame-block {
  flex: 0 0 auto;
}
.esame-block + .esame-block {
  border-top: 1px solid var(--border);
}
.esame-hdr {
  padding: 10px 16px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.esame-hdr.pink    { background: rgba(233,30,99,.15);  color: #f48fb1; border-bottom: 1px solid rgba(233,30,99,.2); }
.esame-hdr.amber   { background: rgba(255,143,0,.13);  color: #ffcc80; border-bottom: 1px solid rgba(255,143,0,.2); }
.esame-hdr.sky     { background: rgba(21,101,192,.15); color: #90caf9; border-bottom: 1px solid rgba(21,101,192,.2);}
.esame-hdr.violet  { background: rgba(106,27,154,.18); color: #ce93d8; border-bottom: 1px solid rgba(106,27,154,.25);}

.esame-body {
  padding: 8px 12px 8px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  line-height: 1.55;
  /* nomi a cascata su 2 colonne */
  -webkit-columns: 3;
  columns: 3;
  -webkit-column-gap: 10px;
  column-gap: 10px;
}
.esame-body .n {
  display: block;
  padding: 1px 0;
  -webkit-column-break-inside: avoid;
  break-inside: avoid;
}
.esame-empty { color: var(--muted); font-style: italic; font-weight: 400; font-size: 15px; }

/* ── ECG STATUS DOT ── */
.ecg-status-dot {
  width: 13px; height: 13px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 10px;
  transition: background .6s, box-shadow .6s;
}
.ecg-status-dot.green {
  background: #00e676;
  box-shadow: 0 0 7px 2px rgba(0,230,118,0.7);
}
.ecg-status-dot.yellow {
  background: #ffb300;
  box-shadow: 0 0 7px 2px rgba(255,179,0,0.7);
  animation: pulse 1.4s ease infinite;
}
.ecg-status-dot.red {
  background: #f44336;
  box-shadow: 0 0 7px 2px rgba(244,67,54,0.55);
}
.ecg-status-dot.gray {
  background: #475569;
  box-shadow: none;
}

/* ── ECG SECTION ── */
.ecg-section {
  animation: fadeUp .5s .21s ease both;
}
.ecg-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  backdrop-filter: blur(16px);
  overflow: hidden;
}
.ecg-cols {
  display: grid;
  grid-template-columns: 1fr 2px 1fr; /* default 2 col, override JS */
}
.ecg-col-divider {
  background: var(--border);
}
.ecg-col-label {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 16px 6px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.ecg-col-label.m { color: #69f0ae; }
.ecg-col-label.p { color: #ffab76; }
.ecg-row {
  display: flex;
  align-items: center;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  gap: 0;
}
.ecg-row .ecg-doctor {
  /* flex gestito da ecg-doc-wrap */
}
.ecg-row:last-child { border-bottom: none; }
.ecg-row:hover { background: rgba(255,255,255,0.04); }
.ecg-row .ecg-doctor {
  font-size: 24px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.ecg-row .ecg-time {
  font-size: 23px;
  font-weight: 500;
  color: rgba(255,255,255,.55);
  font-variant-numeric: tabular-nums;
  padding: 0 14px;
}
.ecg-row .ecg-max {
  font-size: 20px;
  font-weight: 600;
  background: rgba(255,255,255,.08);
  border-radius: 6px;
  padding: 3px 10px;
  color: rgba(255,255,255,.65);
}
.ecg-doc-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.ecg-badge-chip {
  display: inline-flex;
  align-items: center;
  background: rgba(255,80,80,.18);
  color: #ff8080;
  border: 1px solid rgba(255,80,80,.35);
  border-radius: 5px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .4px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}
.ecg-empty {
  padding: 18px;
  text-align: center;
  color: var(--muted);
  font-style: italic;
  font-size: 16px;
}

/* ── ANIMATIONS ── */
@keyframes fadeDown {
  from { opacity:0; transform: translateY(-16px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity:1; }
  50%       { opacity:.35; }
}

</style>
</head>
<body>

<div id="rainbow-bar"></div>

<!-- HEADER: data centrata -->
<div id="header">
  <div id="data-completa">—</div>
</div>

<!-- LOADER BAR -->
<div id="loader-bar"></div>

<!-- VIEWER AREA: contenuto turni medici -->
<div id="viewer-wrap">
  <div id="turni-container">

    <!-- ── MAIN GRID ── -->
    <div class="main-grid">

      <!-- Mattina -->
      <div class="card">
        <div class="card-hdr green">Mattina</div>
        <div class="section-label">Turno completo</div>
        <div class="doc-section" id="wrap-tc-mattina">
          <div class="doc-name" id="tc-mattina"></div>
        </div>
        <div class="section-label">
          <span class="ecg-label">Solo ECG</span>
        </div>
        <div class="doc-section" id="wrap-ecg-mattina">
          <div class="doc-name" id="ecg-mattina"></div>
        </div>
      </div>

      <!-- Pomeriggio -->
      <div class="card">
        <div class="card-hdr orange">Pomeriggio</div>
        <div class="section-label">Turno completo</div>
        <div class="doc-section" id="wrap-tc-pomeriggio">
          <div class="doc-name" id="tc-pomeriggio"></div>
        </div>
        <div class="section-label">
          <span class="ecg-label">Solo ECG</span>
        </div>
        <div class="doc-section" id="wrap-ecg-pomeriggio">
          <div class="doc-name" id="ecg-pomeriggio"></div>
        </div>
      </div>

      <!-- Esami strumentali -->
      <div class="card esami-grid">
        <div class="esame-block">
          <div class="esame-hdr pink">Holter Cardiaco</div>
          <div class="esame-body" id="esame-holterc"></div>
        </div>
        <div class="esame-block">
          <div class="esame-hdr amber">Holter Pressorio</div>
          <div class="esame-body" id="esame-holterp"></div>
        </div>
        <div class="esame-block">
          <div class="esame-hdr sky">Spirometria</div>
          <div class="esame-body" id="esame-spiro"></div>
        </div>
        <div class="esame-block">
          <div class="esame-hdr violet">Polisonnografia</div>
          <div class="esame-body" id="esame-polison"></div>
        </div>
      </div>

    </div><!-- /main-grid -->

    <!-- ── ECG ORARI ── -->
    <div class="ecg-section">
      <div class="card-hdr blue" style="background:rgba(21,101,192,.18);border:1px solid rgba(21,101,192,.3);border-bottom:none;border-radius:18px 18px 0 0;">
        Orario Cardiologi Solo ECG
      </div>
      <div class="ecg-table-wrap">
        <div class="ecg-cols" id="ecg-cols"></div>
      </div>
    </div>

  </div><!-- /turni-container -->
</div><!-- /viewer-wrap -->

<!-- FOOTER -->
<div id="footer">

  <div id="clock">
    <div class="clock-block">
      <div class="digit" id="h1">0</div>
      <div class="digit" id="h2">0</div>
    </div>
    <div class="sep">:</div>
    <div class="clock-block">
      <div class="digit" id="m1">0</div>
      <div class="digit" id="m2">0</div>
    </div>
    <div class="digit-sec">
      <div class="d" id="s1">0</div>
      <div class="d" id="s2">0</div>
    </div>

<script>

var REFRESH_INTERVAL_MS = 30000; // 30 secondi — aggiornamento continuo TV

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function padTime(t) {
  if (!t) return t;
  var parts = t.split(':');
  if (parts.length < 2) return t;
  return pad2(parseInt(parts[0], 10)) + ':' + parts[1];
}

var GIORNI = ['Domenica','Lunedi','Martedi','Mercoledi','Giovedi','Venerdi','Sabato'];
var MESI   = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

var lastUpdated = null;
var nextRefresh = null;
var reloading   = false;

/* ── LOADER BAR ── */
function startLoaderBar() {
  var bar = document.getElementById('loader-bar');
  bar.className = '';
  bar.style.width = '0%';
  void bar.offsetWidth;
  bar.className = 'running';
}
function stopLoaderBar() {
  var bar = document.getElementById('loader-bar');
  bar.style.width = '100%';
  bar.style.opacity = '0';
  setTimeout(function() { bar.className = ''; bar.style.width = '0%'; bar.style.opacity = ''; }, 400);
}

/* ── ICONA REFRESH ── */
function setRefreshIcon(loading) {
  var icon = document.getElementById('refresh-icon');
  if (loading) {
    icon.innerHTML = '&#x21BB;';
    icon.className = 'spinning';
    icon.style.color = '#3b82f6';
  } else {
    icon.innerHTML = '&#x2714;';
    icon.className = '';
    icon.style.color = '#22c55e';
  }
}

/* ── STATUS ── */
function updateRefreshStatus() {
  if (!lastUpdated) return;
  document.getElementById('refresh-text').textContent =
    'Aggiornato alle ' + pad2(lastUpdated.getHours()) + ':' + pad2(lastUpdated.getMinutes());
}

function updateNextRefresh() {
  if (!nextRefresh) return;
  var diff = Math.max(0, Math.floor((nextRefresh - Date.now()) / 1000));
  var mm = Math.floor(diff / 60);
  var ss = diff % 60;
  var nr = new Date(nextRefresh);
  document.getElementById('next-time').textContent = pad2(nr.getHours()) + ':' + pad2(nr.getMinutes());
  document.getElementById('countdown').textContent = 'tra ' + pad2(mm) + ':' + pad2(ss);
}

/* ── OROLOGIO ── */
function updateClock() {
  var now = new Date();
  var h = pad2(now.getHours());
  var m = pad2(now.getMinutes());
  var s = pad2(now.getSeconds());
  document.getElementById('h1').textContent = h[0];
  document.getElementById('h2').textContent = h[1];
  document.getElementById('m1').textContent = m[0];
  document.getElementById('m2').textContent = m[1];
  document.getElementById('s1').textContent = s[0];
  document.getElementById('s2').textContent = s[1];

  var g  = GIORNI[now.getDay()];
  var d  = now.getDate();
  var me = MESI[now.getMonth()];
  var y  = now.getFullYear();
  document.getElementById('data-completa').textContent = g + '  ' + d + ' ' + me + ' ' + y;

  updateNextRefresh();
}

/* ══════════════════════════════════════════
   FIREBASE DATA FETCHING
   ══════════════════════════════════════════ */

var FIRESTORE_BASE = 'https://firestore.googleapis.com/v1/projects/situazione-medici/databases/(default)/documents/turni_medici/';
var RTDB_BASE = 'https://gestione-turni-345c2-default-rtdb.europe-west1.firebasedatabase.app';

function getMondayOfWeek(d) {
  var copy = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var dow = copy.getDay();
  var diff = (dow === 0) ? -6 : 1 - dow;
  copy.setDate(copy.getDate() + diff);
  var yyyy = copy.getFullYear();
  var mm = String(copy.getMonth() + 1); if (mm.length < 2) mm = '0' + mm;
  var dd = String(copy.getDate()); if (dd.length < 2) dd = '0' + dd;
  return yyyy + '-' + mm + '-' + dd;
}

function getTodayDayIdx() {
  var now = new Date();
  var dayOfWeek = now.getDay();
  // Sun=0→5, Mon=1→0, Tue=2→1, Wed=3→2, Thu=4→3, Fri=5→4, Sat=6→5
  var dayMap = [5, 0, 1, 2, 3, 4, 5];
  return dayMap[dayOfWeek] !== undefined ? dayMap[dayOfWeek] : 0;
}

function getSlotForDay(slots, dayIdx) {
  if (!slots) return null;
  if (Array.isArray(slots)) return slots[dayIdx] || null;
  if (typeof slots === 'object') return slots[String(dayIdx)] || null;
  return null;
}

function parseFirestoreValue(value) {
  if (!value) return null;
  if (value.stringValue !== undefined) return value.stringValue;
  if (value.booleanValue !== undefined) return value.booleanValue;
  if (value.integerValue !== undefined) return parseInt(value.integerValue);
  if (value.doubleValue !== undefined) return value.doubleValue;
  if (value.nullValue !== undefined) return null;
  if (value.arrayValue) return (value.arrayValue.values || []).map(parseFirestoreValue);
  if (value.mapValue) {
    var obj = {};
    var fields = value.mapValue.fields || {};
    for (var k in fields) {
      if (fields.hasOwnProperty(k)) obj[k] = parseFirestoreValue(fields[k]);
    }
    return obj;
  }
  return null;
}

function fetchJSON(url, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try { callback(null, JSON.parse(xhr.responseText)); }
        catch(e) { callback(e, null); }
      } else {
        callback(new Error('HTTP ' + xhr.status), null);
      }
    }
  };
  xhr.ontimeout = function() { callback(new Error('Timeout'), null); };
  xhr.send();
}

function parseOrario(orStr) {
  if (!orStr) return null;
  // Gestisce formato oggetto salvato da RTDB (es. {mattina:{start:'08:00',end:'14:00'}, pomeriggio:{...}})
  if (typeof orStr === 'object') {
    var res = {};
    var timeRe = /(\d{1,2}:\d{2})\s*[\/\-\u2013\u2014]\s*(\d{1,2}:\d{2})/;
    // Formato diretto { start, end } senza wrapper mattina/pomeriggio
    if (orStr.start) {
      res.generic = { start: orStr.start, end: orStr.end || '' };
      return res;
    }
    if (orStr.mattina) {
      if (typeof orStr.mattina === 'object' && orStr.mattina.start) {
        res.mattina = { start: orStr.mattina.start, end: orStr.mattina.end || '' };
      } else if (typeof orStr.mattina === 'string') {
        var mp = orStr.mattina.match(timeRe);
        if (mp) res.mattina = { start: mp[1], end: mp[2] };
      }
    }
    if (orStr.pomeriggio) {
      if (typeof orStr.pomeriggio === 'object' && orStr.pomeriggio.start) {
        res.pomeriggio = { start: orStr.pomeriggio.start, end: orStr.pomeriggio.end || '' };
      } else if (typeof orStr.pomeriggio === 'string') {
        var pp = orStr.pomeriggio.match(timeRe);
        if (pp) res.pomeriggio = { start: pp[1], end: pp[2] };
      }
    }
    return (res.mattina || res.pomeriggio) ? res : null;
  }
  // Formato stringa — supporta "Mattina: 9:00 / 13:00", "Mattina: 9:00 - 13:00", separatori – — ecc.
  var res = {};
  var mMatch = orStr.match(/[Mm]attina\s*[:\s]\s*(\d{1,2}:\d{2})\s*[\/\-\u2013\u2014]\s*(\d{1,2}:\d{2})/);
  if (mMatch) res.mattina = { start: mMatch[1], end: mMatch[2] };
  var pMatch = orStr.match(/[Pp]omeriggio\s*[:\s]\s*(\d{1,2}:\d{2})\s*[\/\-\u2013\u2014]\s*(\d{1,2}:\d{2})/);
  if (pMatch) res.pomeriggio = { start: pMatch[1], end: pMatch[2] };
  // Fallback: formato generico senza etichetta "9:00 / 13:00"
  if (!res.mattina && !res.pomeriggio) {
    var plain = orStr.match(/(\d{1,2}:\d{2})\s*[\/\-\u2013\u2014]\s*(\d{1,2}:\d{2})/);
    if (plain) res.generic = { start: plain[1], end: plain[2] };
  }
  return (res.mattina || res.pomeriggio || res.generic) ? res : null;
}

/* Risolve l'orario per un medico: cerca per-slot, per-giorno, poi globale */
function resolveOrario(docData, dayIdx, turno) {
  if (!docData || !docData.orario) return null;
  var or = docData.orario;

  // 1) Per-slot: orario["0_0"] per mattina, orario["0_1"] per pomeriggio
  var sessionIdx = (turno === 'mattina') ? 0 : 1;
  var slotKey = dayIdx + '_' + sessionIdx;
  if (typeof or === 'object' && or[slotKey]) {
    var parsed = parseOrario(or[slotKey]);
    if (parsed) return parsed;
  }

  // 2) Per-giorno: orario["0"], orario["1"], ecc.
  if (typeof or === 'object' && or[String(dayIdx)]) {
    var parsed = parseOrario(or[String(dayIdx)]);
    if (parsed) return parsed;
  }

  // 3) Globale
  return parseOrario(or);
}

function matchCardiologo(docKey, cardiologi) {
  if (!cardiologi || !docKey) return null;
  var dkUp = docKey.toUpperCase().replace(/\u00B7/g, ' ').replace(/[\u2018\u2019\u0060\u00B4\u02BC]/g, "'").trim();
  var dkParts = dkUp.split(/\s+/);
  for (var i = 0; i < cardiologi.length; i++) {
    var c = cardiologi[i];
    if (c.attivo === false) continue;
    var cFullName = ((c.surname || '') + ' ' + (c.firstname || '')).toUpperCase().replace(/[\u2018\u2019\u0060\u00B4\u02BC]/g, "'").trim();
    var cVName = (c.vercelName || '').toUpperCase().replace(/\u00B7/g, ' ').replace(/[\u2018\u2019\u0060\u00B4\u02BC]/g, "'").trim();
    if (dkUp === cFullName || dkUp === cVName) return c;
    var cSurname = (c.surname || '').toUpperCase().trim();
    var cFirst = (c.firstname || '').toUpperCase().trim();
    if (cSurname && cFirst && dkParts.length >= 2) {
      var s0 = dkParts[0].replace(/'/g,'');
      var s1 = cSurname.replace(/'/g,'');
      if ((s0 === s1 || dkParts[0] === cSurname) && cFirst.charAt(0) === dkParts[1].replace(/\./g,'').charAt(0)) return c;
      var sL = dkParts[dkParts.length-1].replace(/'/g,'');
      if ((sL === s1 || dkParts[dkParts.length-1] === cSurname) && cFirst.charAt(0) === dkParts[0].replace(/\./g,'').charAt(0)) return c;
    }
    var cParts = cFullName.split(/\s+/);
    if (cParts.length >= 2 && dkParts.length >= 2) {
      if (cParts[0] === dkParts[0] && dkParts[1].replace(/\./g,'').charAt(0) === cParts[1].charAt(0)) return c;
    }
  }
  return null;
}

function esc(v) {
  return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════
   DATA FETCHING & RENDERING
   ══════════════════════════════════════════ */

function fetchAllData(callback) {
  var weekKey = getMondayOfWeek(new Date());
  var pending = 9;
  var results = {};

  function done(key, val) {
    results[key] = val;
    pending--;
    if (pending === 0) callback(results);
  }

  // Firestore: holter_counts (contiene ecgTimes editati dall'utente)
  var HOLTER_COUNTS_URL = 'https://firestore.googleapis.com/v1/projects/situazione-medici/databases/(default)/documents/holter_counts/' + encodeURIComponent(weekKey);
  fetchJSON(HOLTER_COUNTS_URL, function(err, data) {
    if (err || !data || !data.fields) { done('ecgTimes', {}); return; }
    var ecgTimesField = data.fields.ecgTimes;
    if (ecgTimesField && ecgTimesField.mapValue && ecgTimesField.mapValue.fields) {
      var raw = ecgTimesField.mapValue.fields;
      var parsed = {};
      for (var k in raw) {
        if (raw.hasOwnProperty(k)) parsed[k] = raw[k].stringValue || '';
      }
      done('ecgTimes', parsed);
    } else {
      done('ecgTimes', {});
    }
  });

  // Firestore
  fetchJSON(FIRESTORE_BASE + 'turni', function(err, data) {
    if (err || !data || !data.fields) { done('turni', []); return; }
    done('turni', parseFirestoreValue(data.fields.lista) || []);
  });

  fetchJSON(FIRESTORE_BASE + 'cardiologists', function(err, data) {
    if (err || !data || !data.fields) { done('cardiologists', []); return; }
    done('cardiologists', parseFirestoreValue(data.fields.lista) || []);
  });

  // RTDB
  var rtdbPaths = ['weeks', 'holterWeeks', 'hcWeeks', 'hpWeeks', 'spiroWeeks', 'plsWeeks'];
  for (var i = 0; i < rtdbPaths.length; i++) {
    (function(path) {
      fetchJSON(RTDB_BASE + '/cardio_state/' + path + '/' + encodeURIComponent(weekKey) + '.json', function(err, data) {
        done(path, data || {});
      });
    })(rtdbPaths[i]);
  }
}

function processAndRender(data) {
  var dayIdx = getTodayDayIdx();
  var weeks = data.weeks || {};
  var cardiologists = data.cardiologists || [];

  // === TURNO COMPLETO & SOLO ECG per sessione ===
  var tcMattina = [], ecgMattina = [];
  var tcPomeriggio = [], ecgPomeriggio = [];

  var slotKeyM = dayIdx + '_0';
  var slotKeyP = dayIdx + '_1';

  for (var docKey in weeks) {
    if (!weeks.hasOwnProperty(docKey)) continue;
    var docData = weeks[docKey];
    if (!docData || docData.ferie || !docData.slots) continue;
    var docName = docKey.replace(/\u00B7/g, '.');
    var slots = docData.slots;

    // Mattina
    var slotM = null;
    if (typeof slots === 'object' && !Array.isArray(slots)) {
      slotM = slots[slotKeyM] || null;
    }
    if (slotM === 'confermato') tcMattina.push({ name: docName, key: docKey });
    else if (slotM === 'confermato-ecg') ecgMattina.push({ name: docName, key: docKey });

    // Pomeriggio
    var slotP = null;
    if (typeof slots === 'object' && !Array.isArray(slots)) {
      slotP = slots[slotKeyP] || null;
    }
    if (slotP === 'confermato') tcPomeriggio.push({ name: docName, key: docKey });
    else if (slotP === 'confermato-ecg') ecgPomeriggio.push({ name: docName, key: docKey });
  }

  tcMattina.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });
  ecgMattina.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });
  tcPomeriggio.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });
  ecgPomeriggio.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });

  // === HOLTER TURNI ===
  var holterDocs = [];
  var holterWeeks = data.holterWeeks || {};
  for (var dk in holterWeeks) {
    if (!holterWeeks.hasOwnProperty(dk)) continue;
    var hd = holterWeeks[dk];
    if (!hd || hd.ferie) continue;
    var hSlot = getSlotForDay(hd.slots, dayIdx);
    if (hSlot !== 'confermato') continue;
    holterDocs.push({ name: dk.replace(/\u00B7/g, '.'), key: dk });
  }
  holterDocs.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });

  // === CONSUNTIVO HC ===
  var hcDocs = [];
  var hcWeeks = data.hcWeeks || {};
  for (var dk in hcWeeks) {
    if (!hcWeeks.hasOwnProperty(dk)) continue;
    var hcd = hcWeeks[dk];
    if (!hcd || hcd.ferie) continue;
    var hcSlot = getSlotForDay(hcd.slots, dayIdx);
    if (!hcSlot) continue;
    var hcMax = hcSlot.num || hcSlot.val || '';
    hcDocs.push({ name: dk.replace(/\u00B7/g, '.'), key: dk, max: hcMax });
  }
  hcDocs.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });

  // === CONSUNTIVO HP ===
  var hpDocs = [];
  var hpWeeks = data.hpWeeks || {};
  for (var dk in hpWeeks) {
    if (!hpWeeks.hasOwnProperty(dk)) continue;
    var hpd = hpWeeks[dk];
    if (!hpd || hpd.ferie) continue;
    var hpSlot = getSlotForDay(hpd.slots, dayIdx);
    if (!hpSlot) continue;
    var hpMax = hpSlot.num || hpSlot.val || '';
    hpDocs.push({ name: dk.replace(/\u00B7/g, '.'), key: dk, max: hpMax });
  }
  hpDocs.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });

  // === SPIROMETRIA ===
  var spiroDocs = [];
  var spiroWeeks = data.spiroWeeks || {};
  for (var dk in spiroWeeks) {
    if (!spiroWeeks.hasOwnProperty(dk)) continue;
    var spd = spiroWeeks[dk];
    if (!spd || spd.ferie) continue;
    var spSlot = getSlotForDay(spd.slots, dayIdx);
    if (!spSlot) continue;
    spiroDocs.push({ name: dk.replace(/\u00B7/g, '.'), key: dk });
  }
  spiroDocs.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });

  // === POLISONNOGRAFIA ===
  var plsDocs = [];
  var plsWeeks = data.plsWeeks || {};
  for (var dk in plsWeeks) {
    if (!plsWeeks.hasOwnProperty(dk)) continue;
    var pld = plsWeeks[dk];
    if (!pld || pld.ferie) continue;
    var plSlot = getSlotForDay(pld.slots, dayIdx);
    if (!plSlot) continue;
    plsDocs.push({ name: dk.replace(/\u00B7/g, '.'), key: dk });
  }
  plsDocs.sort(function(a, b) { return a.name.localeCompare(b.name, 'it'); });

  // ══════════════════════════════════════════
  // RENDERING
  // ══════════════════════════════════════════

  // Turno completo & Solo ECG
  renderDocList('tc-mattina', tcMattina);
  renderDocList('tc-pomeriggio', tcPomeriggio);
  renderDocList('ecg-mattina', ecgMattina);
  renderDocList('ecg-pomeriggio', ecgPomeriggio);

  // Holter Cardiaco: turni holter prima, poi consuntivo HC con disponibilità
  var holterCLines = [];
  for (var i = 0; i < holterDocs.length; i++) {
    holterCLines.push('<span class="n" style="color:#f48fb1;">' + esc(holterDocs[i].name) + '</span>');
  }
  if (holterDocs.length > 0 && hcDocs.length > 0) {
    holterCLines.push('<span class="n" style="font-size:9px;opacity:0.4;letter-spacing:2px;column-span:all;">── CONSUNTIVO ──</span>');
  }
  for (var i = 0; i < hcDocs.length; i++) {
    var t = esc(hcDocs[i].name);
    if (hcDocs[i].max) t += ' <span style="font-size:10px;font-weight:400;opacity:.6;">(' + esc(String(hcDocs[i].max)) + ')</span>';
    holterCLines.push('<span class="n">'+t+'</span>');
  }
  document.getElementById('esame-holterc').innerHTML = holterCLines.length
    ? holterCLines.join('')
    : '<span class="esame-empty">\u2014</span>';

  // Holter Pressorio: consuntivo HP
  var hpLines = [];
  for (var i = 0; i < hpDocs.length; i++) {
    var t = esc(hpDocs[i].name);
    if (hpDocs[i].max) t += ' <span style="font-size:10px;font-weight:400;opacity:.6;">(' + esc(String(hpDocs[i].max)) + ')</span>';
    hpLines.push('<span class="n">'+t+'</span>');
  }
  document.getElementById('esame-holterp').innerHTML = hpLines.length
    ? hpLines.join('')
    : '<span class="esame-empty">\u2014</span>';

  // Spirometria
  var spiroLines = [];
  for (var i = 0; i < spiroDocs.length; i++) {
    spiroLines.push('<span class="n">'+esc(spiroDocs[i].name)+'</span>');
  }
  document.getElementById('esame-spiro').innerHTML = spiroLines.length
    ? spiroLines.join('')
    : '<span class="esame-empty">\u2014</span>';

  // Polisonnografia
  var plsLines = [];
  for (var i = 0; i < plsDocs.length; i++) {
    plsLines.push('<span class="n">'+esc(plsDocs[i].name)+'</span>');
  }
  document.getElementById('esame-polison').innerHTML = plsLines.length
    ? plsLines.join('')
    : '<span class="esame-empty">\u2014</span>';

  // ECG Orari — prima cerca ecgTimes (Firestore holter_counts), poi fallback profilo cardiologo
  var ecgTimes = data.ecgTimes || {};
  var allEcgRows = [];
  for (var i = 0; i < ecgMattina.length; i++) {
    var docKey = ecgMattina[i].key;
    var matched = matchCardiologo(docKey, cardiologists);
    var docData = weeks[docKey];
    // 1) ecgTimes da holter_counts (orario editato dall'utente in situazione esami)
    var ecgStartKey = 'd' + dayIdx + '_s0_ecg_start_' + docKey;
    var ecgEndKey   = 'd' + dayIdx + '_s0_ecg_end_'   + docKey;
    var userStart = ecgTimes[ecgStartKey] || '';
    var userEnd   = ecgTimes[ecgEndKey]   || '';
    // 2) Fallback: orario dal profilo cardiologo (Firestore cardiologists)
    var oraDa = '', oraA = '';
    // Prova RTDB poi profilo Firestore (default)
    var orario = resolveOrario(docData, dayIdx, 'mattina');
    if (!orario && matched && matched.orario) { orario = parseOrario(matched.orario); }
    if (orario && orario.mattina) { oraDa = orario.mattina.start; oraA = orario.mattina.end; }
    else if (orario && orario.generic) { oraDa = orario.generic.start; oraA = orario.generic.end; }
    // Sovrascrive solo i campi modificati dall'utente (se vuoti, mantiene il default)
    if (userStart) oraDa = userStart;
    if (userEnd)   oraA  = userEnd;
    // Badge ECG — campi booleani ecg100 / ecg75 (Firestore + RTDB)
    var ecgBadge = '';
    if (matched) {
      if (matched.ecg100 === true) ecgBadge = 'ECG 100';
      else if (matched.ecg75 === true) ecgBadge = 'ECG 75';
    }
    if (!ecgBadge && docData) {
      if (docData.ecg100 === true) ecgBadge = 'ECG 100';
      else if (docData.ecg75 === true) ecgBadge = 'ECG 75';
    }
    allEcgRows.push({
      medico: ecgMattina[i].name,
      turno: 'mattina',
      oraDa: oraDa,
      oraA:  oraA,
      ecgBadge: ecgBadge
    });
  }
  for (var i = 0; i < ecgPomeriggio.length; i++) {
    var docKey = ecgPomeriggio[i].key;
    var matched = matchCardiologo(docKey, cardiologists);
    var docData = weeks[docKey];
    // 1) ecgTimes da holter_counts (orario editato dall'utente in situazione esami)
    var ecgStartKeyP = 'd' + dayIdx + '_s1_ecg_start_' + docKey;
    var ecgEndKeyP   = 'd' + dayIdx + '_s1_ecg_end_'   + docKey;
    var userStartP = ecgTimes[ecgStartKeyP] || '';
    var userEndP   = ecgTimes[ecgEndKeyP]   || '';
    // 2) Fallback: orario dal profilo cardiologo (Firestore cardiologists)
    var oraDaP = '', oraAP = '';
    // Prova RTDB poi profilo Firestore (default)
    var orario = resolveOrario(docData, dayIdx, 'pomeriggio');
    if (!orario && matched && matched.orario) { orario = parseOrario(matched.orario); }
    if (orario && orario.pomeriggio) { oraDaP = orario.pomeriggio.start; oraAP = orario.pomeriggio.end; }
    else if (orario && orario.generic) { oraDaP = orario.generic.start; oraAP = orario.generic.end; }
    // Sovrascrive solo i campi modificati dall'utente (se vuoti, mantiene il default)
    if (userStartP) oraDaP = userStartP;
    if (userEndP)   oraAP  = userEndP;
    // Badge ECG — campi booleani ecg100 / ecg75 (Firestore + RTDB)
    var ecgBadge = '';
    if (matched) {
      if (matched.ecg100 === true) ecgBadge = 'ECG 100';
      else if (matched.ecg75 === true) ecgBadge = 'ECG 75';
    }
    if (!ecgBadge && docData) {
      if (docData.ecg100 === true) ecgBadge = 'ECG 100';
      else if (docData.ecg75 === true) ecgBadge = 'ECG 75';
    }
    allEcgRows.push({
      medico: ecgPomeriggio[i].name,
      turno: 'pomeriggio',
      oraDa: oraDaP,
      oraA:  oraAP,
      ecgBadge: ecgBadge
    });
  }
  renderEcg(allEcgRows);
  updateEcgDots();
}

/* ── ECG STATUS DOTS UPDATE ── */
function timeToMin(t) {
  if (!t) return -1;
  var parts = t.split(':');
  if (parts.length < 2) return -1;
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  if (isNaN(h) || isNaN(m)) return -1;
  return h * 60 + m;
}

function updateEcgDots() {
  var now = new Date();
  var nowMin = now.getHours() * 60 + now.getMinutes();
  var dots = document.querySelectorAll('.ecg-status-dot');
  for (var i = 0; i < dots.length; i++) {
    var dot = dots[i];
    var start = timeToMin(dot.getAttribute('data-start'));
    var end   = timeToMin(dot.getAttribute('data-end'));
    if (start < 0 || end < 0) {
      dot.className = 'ecg-status-dot gray';
    } else if (nowMin >= start && nowMin < end) {
      dot.className = 'ecg-status-dot green';
    } else if (nowMin >= (start - 15) && nowMin < start) {
      dot.className = 'ecg-status-dot yellow';
    } else {
      dot.className = 'ecg-status-dot red';
    }
  }
}

function renderDocList(elId, docs) {
  var el = document.getElementById(elId);
  if (!docs || !docs.length) {
    el.innerHTML = '<span class="doc-empty">\u2014</span>';
    return;
  }
  el.innerHTML = docs.map(function(d) { return esc(d.name); }).join('<br>');
}

function renderEcg(rows) {
  var wrap = document.getElementById('ecg-cols');
  if (!rows || !rows.length) {
    wrap.innerHTML = '<div class="ecg-empty" style="grid-column:1/-1;">Nessun cardiologo solo ECG</div>';
    return;
  }
  var mattina    = rows.filter(function(r) { return r.turno === 'mattina'; });
  var pomeriggio = rows.filter(function(r) { return r.turno === 'pomeriggio'; });

  var MAX_PER_COL = 4;

  // Suddivide un array in chunk di max N elementi
  function chunkArr(arr, n) {
    var out = [];
    if (!arr.length) { out.push([]); return out; }
    for (var i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n));
    return out;
  }

  // Genera HTML per una sotto-colonna
  function subColHtml(list, cls, label, showLabel) {
    var h = '<div>';
    h += '<div class="ecg-col-label ' + cls + '"' +
         (showLabel ? '' : ' style="visibility:hidden;"') + '>' + label + '</div>';
    if (!list.length) {
      h += '<div class="ecg-empty">\u2014</div>';
    } else {
      list.forEach(function(r) {
        var ora = (r.oraDa && r.oraA) ? esc(padTime(r.oraDa)) + ' \u2013 ' + esc(padTime(r.oraA)) : esc(padTime(r.oraDa) || '');
        h += '<div class="ecg-row">';
        h += '<span class="ecg-status-dot gray" data-start="' + esc(r.oraDa || '') + '" data-end="' + esc(r.oraA || '') + '"></span>';
        h += '<div class="ecg-doc-wrap">';
        h += '<span class="ecg-doctor">' + esc(r.medico || '') + '</span>';
        if (r.ecgBadge) h += '<span class="ecg-badge-chip">' + esc(r.ecgBadge) + '</span>';
        h += '</div>';
        h += '<span class="ecg-time">' + ora + '</span>';
        h += '</div>';
      });
    }
    h += '</div>';
    return h;
  }

  var mattinaChunks    = chunkArr(mattina,    MAX_PER_COL);
  var pomeriggioChunks = chunkArr(pomeriggio, MAX_PER_COL);

  // Calcola il grid template dinamico:
  // [M-col…] [thin-div] [M-col…] … [MAIN-DIV 2px] [P-col…] [thin-div] [P-col…] …
  var tpl = [];
  for (var i = 0; i < mattinaChunks.length; i++) {
    if (i > 0) tpl.push('1px');
    tpl.push('1fr');
  }
  tpl.push('2px'); // divisore centrale Mattina / Pomeriggio
  for (var j = 0; j < pomeriggioChunks.length; j++) {
    if (j > 0) tpl.push('1px');
    tpl.push('1fr');
  }
  wrap.style.gridTemplateColumns = tpl.join(' ');

  var html = '';
  // Colonne Mattina
  for (var i = 0; i < mattinaChunks.length; i++) {
    if (i > 0) html += '<div class="ecg-col-divider"></div>';
    html += subColHtml(mattinaChunks[i], 'm', 'Mattina', i === 0);
  }
  // Divisore centrale
  html += '<div class="ecg-col-divider" style="background:rgba(99,102,241,.45);"></div>';
  // Colonne Pomeriggio
  for (var j = 0; j < pomeriggioChunks.length; j++) {
    if (j > 0) html += '<div class="ecg-col-divider"></div>';
    html += subColHtml(pomeriggioChunks[j], 'p', 'Pomeriggio', j === 0);
  }

  wrap.innerHTML = html;
}

/* ── RELOAD ── */
function reloadTurni() {
  if (reloading) return;
  reloading = true;
  setRefreshIcon(true);
  startLoaderBar();

  fetchAllData(function(data) {
    processAndRender(data);
    reloading = false;
    stopLoaderBar();
    setRefreshIcon(false);
    lastUpdated = new Date();
    updateRefreshStatus();
  });
}

/* ── AVVIO ── */
(function init() {
  // Primo render: fetch dati da Firebase
  setRefreshIcon(true);
  startLoaderBar();
  fetchAllData(function(data) {
    processAndRender(data);
    stopLoaderBar();
    setRefreshIcon(false);
    lastUpdated = new Date();
    updateRefreshStatus();
  });

  function scheduleRefresh() {
    nextRefresh = Date.now() + REFRESH_INTERVAL_MS;
    setTimeout(function() {
      reloadTurni();
      scheduleRefresh();
    }, REFRESH_INTERVAL_MS);
  }
  scheduleRefresh();

  setInterval(updateClock, 1000);
  updateClock();
  setInterval(updateEcgDots, 60000);

  // Anti-freeze TV: tocca il DOM ogni 15s
  setInterval(function() {
    var bar = document.getElementById('rainbow-bar');
    bar.style.opacity = '0.99';
    setTimeout(function() { bar.style.opacity = '1'; }, 100);
  }, 15000);

  // Watchdog logo
  var logoSrc = document.getElementById('footer-logo-img').src;
  setInterval(function() {
    var img = document.getElementById('footer-logo-img');
    if (!img.src || img.src.length < 100 || img.naturalWidth === 0) {
      img.src = logoSrc;
    }
  }, 30000);
})();

</script>
