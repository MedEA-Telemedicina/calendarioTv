<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Ufficio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
background:black;
width:100%;
height:100%;
overflow:hidden;
}

/* CONTENITORE */

.container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

/* CALENDARIO */

iframe{
width:100%;
height:100%;
border:none;
}

/* OROLOGIO */

#clock{

position:fixed;
top:30px;
right:40px;

font-family:'Orbitron', sans-serif;
font-size:60px;
letter-spacing:3px;

color:#00e5ff;

padding:12px 26px;

background:rgba(0,0,0,0.45);
backdrop-filter:blur(8px);

border-radius:14px;

box-shadow:
0 0 10px rgba(0,229,255,0.6),
0 0 25px rgba(0,229,255,0.3);

z-index:9999;

}

</style>

</head>

<body>

<div id="clock"></div>

<div class="container">

<iframe id="frameA"></iframe>
<iframe id="frameB" style="display:none"></iframe>

</div>

<script>

// LINK EXCEL

const url="https://medeadigitalhealth-my.sharepoint.com/personal/a_marino_med-ea_it/_layouts/15/Doc.aspx?sourcedoc={262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!B1%3AAK23";

let active="A";

document.getElementById("frameA").src=url;


// ------------------
// OROLOGIO
// ------------------

function updateClock(){

const now=new Date();

let h=String(now.getHours()).padStart(2,'0');
let m=String(now.getMinutes()).padStart(2,'0');

document.getElementById("clock").innerText=h+":"+m;

}

setInterval(updateClock,1000);
updateClock();


// ------------------
// REFRESH INVISIBILE
// ------------------

function refresh(){

let current=document.getElementById("frame"+active);
let next=document.getElementById("frame"+(active==="A"?"B":"A"));

next.onload=function(){

current.style.display="none";
next.style.display="block";

active=(active==="A")?"B":"A";

};

next.src=url+"&t="+new Date().getTime();

}

setInterval(refresh,60000);


// ------------------
// ANTI FREEZE TV
// ------------------

setInterval(function(){

window.scrollTo(0,1);
window.scrollTo(0,0);

},20000);


// ------------------
// HARD RESET 8 ORE
// ------------------

setTimeout(function(){

location.reload();

},28800000);

</script>

</body>

</html>
