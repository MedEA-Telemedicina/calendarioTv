<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Ufficio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    
    <!-- SCRIPT PER BYPASSARE I BLOCCHI IFRAME DELLE SMART TV -->
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        html, body { margin: 0; padding: 0; background: black; width: 100%; height: 100%; overflow: hidden; }
        .container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* Importante: is="x-frame-bypass" richiede che l'elemento sia trattato correttamente */
        iframe { width: 100%; height: 100%; border: none; background: white; }

        #clock {
            position: fixed; top: 30px; right: 40px;
            font-family: 'Orbitron', sans-serif; font-size: 60px; letter-spacing: 3px;
            color: #00e5ff; padding: 12px 26px;
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(8px);
            border-radius: 14px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.6), 0 0 25px rgba(0, 229, 255, 0.3);
            z-index: 9999;
        }
    </style>
</head>

<body>
    <div id="clock">--:--</div>

    <div class="container">
        <!-- Aggiunto l'attributo is="x-frame-bypass" per aggirare i blocchi Microsoft -->
        <iframe is="x-frame-bypass" id="frameA"></iframe>
        <iframe is="x-frame-bypass" id="frameB" style="display:none"></iframe>
    </div>

    <script>
        const baseUrl = "https://medeadigitalhealth-my.sharepoint.com/personal/a_marino_med-ea_it/_layouts/15/Doc.aspx?sourcedoc={262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!B1%3AAK23";
        
        let active = "A";

        // Inizializzazione primo frame
        document.getElementById("frameA").src = baseUrl;

        // OROLOGIO
        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById("clock").innerText = h + ":" + m;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // REFRESH INVISIBILE MIGLIORATO
        function refresh() {
            let currentId = "frame" + active;
            let nextId = "frame" + (active === "A" ? "B" : "A");
            
            let current = document.getElementById(currentId);
            let next = document.getElementById(nextId);

            // Carica il nuovo contenuto nel frame nascosto
            next.src = baseUrl + "&cache=" + new Date().getTime();

            next.onload = function() {
                next.style.display = "block";
                current.style.display = "none";
                active = (active === "A" ? "B" : "A");
                console.log("Switch effettuato su " + active);
            };
        }

        // Ogni 60 secondi
        setInterval(refresh, 60000);

        // ANTI FREEZE & RESET (8 ore)
        setInterval(() => { window.scrollBy(0, 1); window.scrollBy(0, -1); }, 20000);
        setTimeout(() => { location.reload(); }, 28800000);
    </script>
</body>
</html>
