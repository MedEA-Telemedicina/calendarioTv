<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Ufficio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
html, body{
margin:0;
padding:0;
background:black;
width:100%;
height:100%;
overflow:hidden;
}

.container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
}

#clock{
position:fixed;
top:30px;
right:40px;
font-family:'Orbitron',sans-serif;
font-size:60px;
letter-spacing:3px;
color:#00e5ff;
padding:12px 26px;
background:rgba(0,0,0,0.45);
border-radius:14px;
box-shadow:0 0 10px rgba(0,229,255,0.6);
z-index:9999;
}
</style>
</head>

<body>

<div id="clock">--:--</div>

<div class="container">
<iframe id="frameA"></iframe>
<iframe id="frameB" style="display:none"></iframe>
</div>

<script>

var baseUrl = "https://medeadigitalhealth-my.sharepoint.com/personal/a_marino_med-ea_it/_layouts/15/Doc.aspx?sourcedoc={262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!B1%3AAK23";

var frameA = document.getElementById("frameA");
var frameB = document.getElementById("frameB");

var activeFrame = frameA;
var hiddenFrame = frameB;

frameA.src = baseUrl;

function pad(n){
return n<10 ? "0"+n : n;
}

function updateClock(){
var now = new Date();
document.getElementById("clock").innerHTML = pad(now.getHours()) + ":" + pad(now.getMinutes());
}

setInterval(updateClock,1000);
updateClock();


function refresh(){

hiddenFrame.onload = null;

hiddenFrame.src = baseUrl + "&cache=" + new Date().getTime();

hiddenFrame.onload = function(){

setTimeout(function(){

activeFrame.style.display="none";
hiddenFrame.style.display="block";

var temp = activeFrame;
activeFrame = hiddenFrame;
hiddenFrame = temp;

},500); // ritardo per evitare flash bianco

};

}

setInterval(refresh,60000);


function antiFreeze(){
window.scrollBy(0,1);
window.scrollBy(0,-1);
}

setInterval(antiFreeze,20000);


setTimeout(function(){
location.reload();
},28800000);

</script>
</html>
