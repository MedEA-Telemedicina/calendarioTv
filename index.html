<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Ufficio</title>

<style>

html,body{
margin:0;
padding:0;
background:#0f1720;
width:100%;
height:100%;
overflow:hidden;
font-family:Segoe UI,Arial;
}

iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
background:white;
}

/* clock */

#clock{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:14px;
padding:12px 32px;
background:rgba(5,12,20,0.90); /* più contrasto */
border-radius:18px;
z-index:9999;
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

.digit{
width:75px;
height:100px;
display:flex;
align-items:center;
justify-content:center;
font-size:75px;
font-weight:700; /* più leggibile */
color:#ffffff;
text-shadow:0 2px 6px rgba(0,0,0,0.8); /* leggibilità da lontano */
}

.sep{
font-size:75px;
color:#4da3ff;
font-weight:700;
text-shadow:0 2px 6px rgba(0,0,0,0.8);
}
  
</style>
</head>

<body>

<iframe id="viewer"></iframe>

<div id="clock">

<div class="digit" id="h1">0</div>
<div class="digit" id="h2">0</div>

<div class="sep">:</div>

<div class="digit" id="m1">0</div>
<div class="digit" id="m2">0</div>

</div>

<script>

/* URL EXCEL */

var baseUrl="https://medeadigitalhealth-my.sharepoint.com/personal/a_marino_med-ea_it/_layouts/15/Doc.aspx?sourcedoc={262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!A1%3AAK22";

var iframe=document.getElementById("viewer");


function reloadExcel(){

/* libera memoria */

iframe.src="about:blank";

/* ricarica */

setTimeout(function(){

iframe.src=baseUrl+"&t="+Date.now();

},2000);

}

/* primo caricamento */

reloadExcel();

/* refresh excel ogni 5 minuti */

setInterval(reloadExcel,300000);


/* orologio */

function updateClock(){

var now=new Date();

var h=now.getHours().toString().padStart(2,"0");
var m=now.getMinutes().toString().padStart(2,"0");

document.getElementById("h1").innerHTML=h[0];
document.getElementById("h2").innerHTML=h[1];
document.getElementById("m1").innerHTML=m[0];
document.getElementById("m2").innerHTML=m[1];

}

setInterval(updateClock,1000);
updateClock();


/* anti freeze browser */

setInterval(function(){

window.scrollBy(0,1);
window.scrollBy(0,-1);

},20000);


/* reload completo ogni 15 minuti */

setInterval(function(){

location.reload();

},900000);

</script>

</body>
</html>
