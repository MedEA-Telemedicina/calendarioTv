
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pianificazione Medici</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #070f1c;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  color: #e2e8f0;
}

/* ── BARRA TOP ANIMATA ── */
#rainbow-bar {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 4px;
  z-index: 10000;
  background: linear-gradient(90deg,
    #3b82f6, #6366f1, #8b5cf6, #3b82f6, #06b6d4, #3b82f6);
  background-size: 400% 100%;
  -webkit-animation: slideBar 6s linear infinite;
  animation: slideBar 6s linear infinite;
}
@-webkit-keyframes slideBar {
  0%   { background-position: 0% 0%; }
  100% { background-position: 400% 0%; }
}
@keyframes slideBar {
  0%   { background-position: 0% 0%; }
  100% { background-position: 400% 0%; }
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 4px; left: 0;
  width: 100%; height: 64px;
  z-index: 9998;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  background: linear-gradient(180deg, rgba(10,22,45,0.98) 0%, rgba(7,15,28,0.92) 100%);
  border-bottom: 1px solid rgba(59,130,246,0.3);
}

#data-completa {
  font-size: 28px;
  font-weight: 700;
  color: #f0f6ff;
  letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(59,130,246,0.5);
}

/* ── REFRESH LOADER BAR ── */
#loader-bar {
  position: fixed;
  top: 68px; left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  z-index: 9997;
  opacity: 0;
  -webkit-transition: opacity 0.3s;
  transition: opacity 0.3s;
  border-radius: 0 2px 2px 0;
}
#loader-bar.running {
  opacity: 1;
  -webkit-animation: loadAnim 25s linear forwards;
  animation: loadAnim 25s linear forwards;
}
@-webkit-keyframes loadAnim {
  0%   { width: 0%; }
  80%  { width: 90%; }
  100% { width: 90%; }
}
@keyframes loadAnim {
  0%   { width: 0%; }
  80%  { width: 90%; }
  100% { width: 90%; }
}

/* ── IFRAME AREA ── */
#viewer-wrap {
  position: fixed;
  top: 71px;
  left: 0;
  bottom: 90px;
  right: 0;
  overflow: hidden;
  z-index: 1;
  background: #070f1c;
}

/* Due iframe sovrapposti: quello attivo sta sopra, quello in caricamento sotto */
.viewer-frame {
  position: absolute;
  top: 0; left: 0;
  border: none;
  display: block;
  -webkit-transition: opacity 0.15s ease;
  transition: opacity 0.15s ease;
}
/* Standby nascosto con visibility (piu' affidabile di opacity su Tizen WebKit) */
.viewer-frame.standby {
  visibility: hidden;
  opacity: 0;
  z-index: 2;
}
.viewer-frame.active {
  visibility: visible;
  opacity: 1;
  z-index: 3;
}

/* Overlay SOLO per il primo avvio */
#reload-overlay {
  position: fixed;
  top: 71px; left: 0;
  bottom: 90px; right: 0;
  background: #070f1c;
  z-index: 5000;
  display: none;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}
#reload-overlay.visible {
  display: -webkit-flex;
  display: flex;
}

/* ── FOOTER ── */
#footer {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 90px;
  z-index: 9998;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  padding: 0 40px;
  background: linear-gradient(0deg, rgba(10,22,45,0.98) 0%, rgba(7,15,28,0.92) 100%);
  border-top: 1px solid rgba(59,130,246,0.25);
}

/* Orologio */
#clock {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 4px;
}

.clock-block {
  display: -webkit-flex;
  display: flex;
  gap: 2px;
}

.digit {
  width: 52px; height: 72px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  font-size: 62px;
  font-weight: 800;
  color: #f1f5f9;
  text-shadow: 0 0 18px rgba(59,130,246,0.6);
  line-height: 1;
  -webkit-font-smoothing: antialiased;
}

.sep {
  font-size: 58px;
  font-weight: 800;
  color: #3b82f6;
  text-shadow: 0 0 18px rgba(59,130,246,0.8);
  padding: 0 4px;
  line-height: 1;
  -webkit-animation: blink 1s step-end infinite;
  animation: blink 1s step-end infinite;
}
@-webkit-keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}

.digit-sec {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: flex-end;
  align-items: flex-end;
  padding-bottom: 10px;
  gap: 1px;
}

.digit-sec .d {
  font-size: 30px;
  font-weight: 700;
  color: #64748b;
  width: 20px;
  text-align: center;
}

/* Centro footer */
#footer-center {
  text-align: center;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}

#footer-logo-img {
  height: 52px;
  width: auto;
  /* Forza il mantenimento in memoria */
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

#refresh-status {
  margin-top: 6px;
  font-size: 12px;
  color: #475569;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  gap: 6px;
}

#refresh-icon {
  display: inline-block;
  font-size: 14px;
  color: #22c55e;
}
#refresh-icon.spinning {
  -webkit-animation: spin 1s linear infinite;
  animation: spin 1s linear infinite;
}
@-webkit-keyframes spin {
  0%   { -webkit-transform: rotate(0deg);   }
  100% { -webkit-transform: rotate(360deg); }
}
@keyframes spin {
  0%   { transform: rotate(0deg);   }
  100% { transform: rotate(360deg); }
}

/* Destra footer */
#footer-right {
  text-align: right;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-justify-content: center;
  justify-content: center;
}

#next-label {
  font-size: 13px;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

#next-time {
  font-size: 22px;
  font-weight: 700;
  color: #94a3b8;
  margin-top: 3px;
}

#countdown {
  font-size: 13px;
  color: #334155;
  margin-top: 2px;
}

</style>
</head>
<body>

<div id="rainbow-bar"></div>

<!-- HEADER: solo data centrata -->
<div id="header">
  <div id="data-completa">—</div>
</div>

<!-- LOADER BAR -->
<div id="loader-bar"></div>

<!--
  DOPPIO IFRAME per transizioni senza flash nero.
  viewer-a = iframe attivo (visibile)
  viewer-b = iframe in caricamento (nascosto finché pronto)
  Dopo lo swap, il vecchio iframe viene svuotato per liberare memoria.
  Risultato: sempre 1 solo iframe caricato, transizione fluida.
-->
<div id="viewer-wrap">
  <iframe id="viewer-a" class="viewer-frame" scrolling="no"></iframe>
  <iframe id="viewer-b" class="viewer-frame" scrolling="no"></iframe>
</div>

<!-- Overlay: visibile SOLO al primo avvio -->
<div id="reload-overlay" class="visible"></div>

function stopLoaderBar() {
  var bar = document.getElementById('loader-bar');
  bar.style.width = '100%';
  bar.style.opacity = '0';
  setTimeout(function() { bar.className = ''; bar.style.width = '0%'; bar.style.opacity = ''; }, 400);
}

/* ── ICONA REFRESH ── */
function setRefreshIcon(loading) {
  var icon = document.getElementById('refresh-icon');
  if (loading) {
    icon.innerHTML = '&#x21BB;';
    icon.className = 'spinning';
    icon.style.color = '#3b82f6';
  } else {
    icon.innerHTML = '&#x2714;';
    icon.className = '';
    icon.style.color = '#22c55e';
  }
}

/* ── OVERLAY (solo primo avvio) ── */
function hideOverlay() {
  document.getElementById('reload-overlay').className = '';
}

/*
  ── CARICA IFRAME con tecnica doppio-slot + MIN-WAIT + DEBOUNCE ──

  Strategia ibrida piu' affidabile:
  - SWAP_MIN_WAIT_MS : attesa minima garantita dall'avvio del caricamento
                       (Excel impiega ~12s, quindi 13s e' sicuro)
  - SWAP_DEBOUNCE_MS : ms di silenzio dopo l'ULTIMO onload
  Lo swap parte al MAX(MIN_WAIT, ultimo_onload + DEBOUNCE).
  Cosi' anche se onload smette per 5s a meta' render, lo swap non parte
  prima dei 13s garantiti.
  Hard-timeout di 40s come ultima risorsa.
*/
var SWAP_MIN_WAIT_MS = 13000; // attesa minima garantita (Excel ~12s)
var SWAP_DEBOUNCE_MS = 2000;  // silenzio minimo dopo l'ultimo onload

function loadIntoStandby(url, onDone) {
  var standby   = getStandbyFrame();
  var loadStart = Date.now();

  // Assicura che standby sia nascosto
  setStandby(standby);
  setActive(getActiveFrame());

  var done        = false;
  var swapTimer   = null;

  // Hard-timeout assoluto
  var hardTimer = setTimeout(function() {
    if (!done) {
      done = true;
      if (swapTimer) clearTimeout(swapTimer);
      standby.onload = null;
      doSwap();
    }
  }, 40000);

  standby.onload = function() {
    if (done) return;
    // Resetta il debounce ad ogni onload
    if (swapTimer) clearTimeout(swapTimer);
    swapTimer = setTimeout(function() {
      if (!done) {
        // Controlla che sia trascorsa anche l'attesa minima
        var elapsed = Date.now() - loadStart;
        var remaining = SWAP_MIN_WAIT_MS - elapsed;
        if (remaining > 0) {
          // Aspetta il tempo residuo, poi fa lo swap
          swapTimer = setTimeout(function() {
            if (!done) {
              done = true;
              clearTimeout(hardTimer);
              standby.onload = null;
              doSwap();
            }
          }, remaining);
        } else {
          done = true;
          clearTimeout(hardTimer);
          standby.onload = null;
          doSwap();
        }
      }
    }, SWAP_DEBOUNCE_MS);
  };

  standby.src = url;

  function doSwap() {
    var oldActive = getActiveFrame();
    var newActive = getStandbyFrame();

    newActive.style.visibility = 'visible';
    newActive.style.zIndex     = '3';
    newActive.style.opacity    = '1';
    newActive.classList.remove('standby');
    newActive.classList.add('active');

    setTimeout(function() {
      oldActive.onload = null;
      setStandby(oldActive);
      oldActive.src = 'about:blank';
      activeSlot = (activeSlot === 'a' ? 'b' : 'a');
      if (onDone) onDone();
    }, 200);
  }
}

/* ── PRIMO AVVIO (carica direttamente in slot A, overlay copre tutto) ── */
function firstLoad(url, onDone) {
  var af        = getActiveFrame();
  var loadStart = Date.now();
  setActive(af);
  setStandby(getStandbyFrame());

  var done      = false;
  var swapTimer = null;

  var hardTimer = setTimeout(function() {
    if (!done) { done = true; af.onload = null; if (onDone) onDone(); }
  }, 40000);

  af.onload = function() {
    if (done) return;
    if (swapTimer) clearTimeout(swapTimer);
    swapTimer = setTimeout(function() {
      if (!done) {
        var elapsed   = Date.now() - loadStart;
        var remaining = SWAP_MIN_WAIT_MS - elapsed;
        if (remaining > 0) {
          swapTimer = setTimeout(function() {
            if (!done) {
              done = true;
              clearTimeout(hardTimer);
              af.onload = null;
              if (onDone) onDone();
            }
          }, remaining);
        } else {
          done = true;
          clearTimeout(hardTimer);
          af.onload = null;
          if (onDone) onDone();
        }
      }
    }, SWAP_DEBOUNCE_MS);
  };

  af.src = url;
}

/* ── RELOAD EXCEL ── */
function reloadExcel() {
  if (reloading) return;
  reloading = true;
  setRefreshIcon(true);
  startLoaderBar();

  var url = BASE_URL + '&t=' + Date.now();
  loadIntoStandby(url, function() {
    reloading = false;
    stopLoaderBar();
    setRefreshIcon(false);
    lastUpdated = new Date();
    updateRefreshStatus();
  });
}

/* ── STATUS ── */
function updateRefreshStatus() {
  if (!lastUpdated) return;
  document.getElementById('refresh-text').textContent =
    'Aggiornato alle ' + pad2(lastUpdated.getHours()) + ':' + pad2(lastUpdated.getMinutes());
}

function updateNextRefresh() {
  if (!nextRefresh) return;
  var diff = Math.max(0, Math.floor((nextRefresh - Date.now()) / 1000));
  var mm = Math.floor(diff / 60);
  var ss = diff % 60;
  var nr = new Date(nextRefresh);
  document.getElementById('next-time').textContent = pad2(nr.getHours()) + ':' + pad2(nr.getMinutes());
  document.getElementById('countdown').textContent = 'tra ' + pad2(mm) + ':' + pad2(ss);
}

/* ── OROLOGIO ── */
function updateClock() {
  var now = new Date();
  var h = pad2(now.getHours());
  var m = pad2(now.getMinutes());
  var s = pad2(now.getSeconds());
  document.getElementById('h1').textContent = h[0];
  document.getElementById('h2').textContent = h[1];
  document.getElementById('m1').textContent = m[0];
  document.getElementById('m2').textContent = m[1];
  document.getElementById('s1').textContent = s[0];
  document.getElementById('s2').textContent = s[1];

  var g  = GIORNI[now.getDay()];
  var d  = now.getDate();
  var me = MESI[now.getMonth()];
  var y  = now.getFullYear();
  document.getElementById('data-completa').textContent = g + '  ' + d + ' ' + me + ' ' + y;

  updateNextRefresh();
}

/* ── AVVIO ── */
(function init() {
  setRefreshIcon(true);
  startLoaderBar();

  firstLoad(BASE_URL + '&t=' + Date.now(), function() {
    hideOverlay();
    stopLoaderBar();
    setRefreshIcon(false);
    lastUpdated = new Date();
    updateRefreshStatus();
  });

  function scheduleRefresh() {
    nextRefresh = Date.now() + REFRESH_INTERVAL_MS;
    setTimeout(function() {
      reloadExcel();
      scheduleRefresh();
    }, REFRESH_INTERVAL_MS);
  }
  scheduleRefresh();

  setInterval(updateClock, 1000);
  updateClock();

  // Anti-freeze TV: tocca il DOM ogni 15s per evitare che Tizen congeli il tab
  setInterval(function() {
    var bar = document.getElementById('rainbow-bar');
    bar.style.opacity = '0.99';
    setTimeout(function() { bar.style.opacity = '1'; }, 100);
  }, 15000);

  // Watchdog logo: controlla ogni 30s che l'immagine sia ancora visibile
  // (difesa contro Tizen che sotto pressione memoria svuota i src base64)
  var logoSrc = document.getElementById('footer-logo-img').src;
  setInterval(function() {
    var img = document.getElementById('footer-logo-img');
    if (!img.src || img.src.length < 100 || img.naturalWidth === 0) {
      img.src = logoSrc;
    }
  }, 30000);
})();

</script>
