<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Ufficio</title>

<style>

html,body{
margin:0;
padding:0;
background:#0f1720;
width:100%;
height:100%;
overflow:hidden;
font-family:Segoe UI,Arial;
}

.viewer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
background:white;
opacity:0;
transition:opacity .6s;
}

.viewer.active{
opacity:1;
z-index:2;
}

/* clock */

#clock{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:18px;
padding:15px 40px;
background:rgba(10,20,35,0.75);
border-radius:20px;
backdrop-filter:blur(6px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
z-index:9999;
}

.digit{
width:90px;
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
font-weight:600;
color:#e6edf5;
}

.sep{
font-size:90px;
color:#7fa6c9;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}
}

</style>
</head>

<body>

<iframe id="frame1" class="viewer active"></iframe>
<iframe id="frame2" class="viewer"></iframe>

<div id="clock">

<div class="digit" id="h1">0</div>
<div class="digit" id="h2">0</div>

<div class="sep">:</div>

<div class="digit" id="m1">0</div>
<div class="digit" id="m2">0</div>

</div>

<script>

/* URL EXCEL */

var baseUrl="https://medeadigitalhealth-my.sharepoint.com/personal/a_marino_med-ea_it/_layouts/15/Doc.aspx?sourcedoc={262d4f88-53c5-4e88-bae3-869f9d2a3b6e}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&Item='LAVAGNA%20GIORNALIERA'!A1%3AAK21";

/* iframe */

var frame1=document.getElementById("frame1");
var frame2=document.getElementById("frame2");

var active=frame1;
var hidden=frame2;

/* carica */

function loadHidden(){

hidden.src=baseUrl+"&t="+Date.now();

hidden.onload=function(){

hidden.classList.add("active");
active.classList.remove("active");

/* libera memoria */

active.src="about:blank";

/* swap */

var temp=active;
active=hidden;
hidden=temp;

};

}

/* primo caricamento */

active.src=baseUrl+"&t="+Date.now();

/* refresh excel */

setInterval(loadHidden,300000); // 5 minuti


/* orologio */

function updateDigit(id,val){

var el=document.getElementById(id);

if(el.innerHTML!==val){
el.innerHTML=val;
}

}

function updateClock(){

var now=new Date();

var h=now.getHours().toString().padStart(2,"0");
var m=now.getMinutes().toString().padStart(2,"0");

updateDigit("h1",h[0]);
updateDigit("h2",h[1]);

updateDigit("m1",m[0]);
updateDigit("m2",m[1]);

}

setInterval(updateClock,1000);
updateClock();


/* anti freeze browser tv */

setInterval(function(){

window.scrollBy(0,1);
window.scrollBy(0,-1);

},20000);


/* reload sicurezza */

setInterval(function(){

location.reload();

},1800000); // 30 minuti

</script>

</body>
</html>
